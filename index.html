<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Live Chat Room</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;background:radial-gradient(circle at top left,rgba(1,105,111,0.28),transparent 40%),linear-gradient(135deg,#020617 0%,#111827 45%,#020617 100%);color:#f1f5f9}
header{padding:1rem 1.5rem;background:rgba(255,255,255,0.05);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
header h1{font-size:1.2rem;font-weight:700;color:#34d399}
.rooms{display:flex;gap:0.5rem;flex-wrap:wrap}
.room-btn{padding:0.3rem 0.9rem;border-radius:999px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.05);color:#94a3b8;cursor:pointer;font-size:0.85rem}
.room-btn.active{background:#34d399;color:#0f172a;border-color:#34d399;font-weight:700}
#username-bar{padding:0.45rem 1.5rem;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:0.5rem;font-size:0.82rem;color:#94a3b8}
#username-bar input{width:150px;padding:0.2rem 0.6rem;border-radius:6px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);color:#f1f5f9;font-size:0.82rem}
#status{font-size:0.75rem;padding:0.3rem 1.5rem;background:rgba(0,0,0,0.3);color:#64748b;text-align:center}
#messages{flex:1;overflow-y:auto;padding:1rem 1.5rem;display:flex;flex-direction:column;gap:0.55rem}
.msg{padding:0.6rem 1rem;border-radius:12px;background:radial-gradient(circle at top left,rgba(255,255,255,0.1),rgba(15,23,42,0.55));border:1px solid rgba(255,255,255,0.12);box-shadow:0 4px 20px rgba(0,0,0,0.3);backdrop-filter:blur(12px)}
.msg .meta{font-size:0.72rem;color:#64748b;margin-bottom:0.18rem}
.msg .meta span{color:#34d399;font-weight:600}
.msg .text{font-size:0.93rem;color:#e2e8f0;word-break:break-word}
form{display:flex;gap:0.5rem;padding:1rem 1.5rem;background:rgba(255,255,255,0.04);backdrop-filter:blur(18px);border-top:1px solid rgba(255,255,255,0.1)}
#msg{flex:1;padding:0.65rem 1rem;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#f1f5f9;font-size:0.95rem}
#msg:focus{outline:none;border-color:#34d399}
button[type=submit]{padding:0.65rem 1.3rem;border-radius:10px;border:none;background:#34d399;color:#0f172a;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<header>
  <h1>Live Chat</h1>
  <div class="rooms">
    <button class="room-btn active" onclick="switchRoom('general',this)">General</button>
    <button class="room-btn" onclick="switchRoom('study',this)">Study Hall</button>
    <button class="room-btn" onclick="switchRoom('gaming',this)">Gaming</button>
    <button class="room-btn" onclick="switchRoom('random',this)">Random</button>
  </div>
</header>
<div id="username-bar">Your name: <input id="uname" value="Anonymous" maxlength="20"/></div>
<div id="status">Connecting...</div>
<div id="messages"></div>
<form onsubmit="sendMsg(event)">
  <input id="msg" placeholder="Type a message..." autocomplete="off" required/>
  <button type="submit">Send</button>
</form>
<script>
const sb=supabase.createClient('https://ibvmnwntciifgfjuchcw.supabase.co','sb_publishable_HcNk-snxnySBE9adLYTlKg_4sIOCmKI');
let room='general',ch;
const box=()=>document.getElementById('messages');
const stat=m=>document.getElementById('status').textContent=m;
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function addMsg(m){
  const b=box();const e=b.querySelector('.empty');if(e)e.remove();
  const d=document.createElement('div');d.className='msg';
  const t=new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  d.innerHTML='<div class="meta"><span>'+esc(m.username)+'</span> · '+t+'</div><div class="text">'+esc(m.content)+'</div>';
  b.appendChild(d);b.scrollTop=b.scrollHeight;
}
async function load(){
  const b=box();b.innerHTML='<div class="empty" style="color:#64748b;text-align:center;padding:2rem">Loading...</div>';
  const{data,error}=await sb.from('messages').select('*').eq('room',room).order('created_at',{ascending:true}).limit(100);
  b.innerHTML='';
  if(error){stat('Error: '+error.message);return;}
  if(!data.length)b.innerHTML='<div class="empty" style="color:#64748b;text-align:center;padding:2rem">No messages yet - say hello!</div>';
  else data.forEach(addMsg);
  b.scrollTop=b.scrollHeight;
  stat('Connected · #'+room);
}
function subscribe(){
  if(ch)sb.removeChannel(ch);
  ch=sb.channel('room-'+room)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'room=eq.'+room},p=>addMsg(p.new))
    .subscribe(s=>{if(s==='SUBSCRIBED')stat('Connected · #'+room);});
}
function switchRoom(r,btn){
  room=r;
  document.querySelectorAll('.room-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');load();subscribe();
}
async function sendMsg(e){
  e.preventDefault();
  const content=document.getElementById('msg').value.trim();
  const username=document.getElementById('uname').value.trim()||'Anonymous';
  if(!content)return;
  document.getElementById('msg').value='';
  await sb.from('messages').insert({room,username,content});
}
load();subscribe();
</script>
</body>
</html>
