<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ni88er Chat Room</title>
<link href="https://api.fontshare.com/v2/css?f=satoshi:400,500,700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --bg:#f7f6f2;--surface:#fbfbf9;--surface2:#f4f2ed;
  --border:#d5d1c9;--text:#27241d;--muted:#79766f;
  --primary:#01696f;--primary2:#0c4e54;--inverse:#f9f8f4;
  --shadow:0 4px 20px rgba(0,0,0,.07);
  --radius:1rem;--font:Satoshi,system-ui,sans-serif;
}
[data-theme="dark"]{
  --bg:#171614;--surface:#1d1c1a;--surface2:#22211f;
  --border:#393733;--text:#d0cfcc;--muted:#9b9892;
  --primary:#4f98a3;--primary2:#227f8b;--inverse:#1b1a18;
  --shadow:0 4px 20px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;width:100%;
  font-family:var(--font);color:var(--text);
  background:radial-gradient(circle at top left,color-mix(in srgb,var(--primary) 15%,transparent) 30%,var(--bg));
  overflow:hidden;
}
button,input{font:inherit}
button{cursor:pointer;border:none;background:none}

/* APP SHELL */
.app{
  display:flex;
  height:100dvh;
  width:100dvw;
  overflow:hidden;
}

/* SIDEBAR - no scroll, fixed height */
.side{
  width:280px;
  min-width:280px;
  display:flex;
  flex-direction:column;
  background:var(--surface);
  border-right:1px solid var(--border);
  overflow:hidden;
  padding:1rem;
  gap:.75rem;
  flex-shrink:0;
}
.brand{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:.25rem 0;
  flex-shrink:0;
}
.brand h1{font-size:1.25rem;font-weight:700}
.toggle{
  width:38px;height:38px;
  border-radius:999px;
  background:var(--surface2);
  color:var(--text);
  font-size:1rem;
  flex-shrink:0;
}
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:.85rem;
  flex-shrink:0;
}
.card-label{
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:.6rem;
}
.rooms{display:flex;flex-direction:column;gap:.4rem}
.room{
  padding:.7rem .9rem;
  text-align:left;
  border-radius:.75rem;
  border:1px solid transparent;
  color:var(--text);
  transition:background .15s,border-color .15s;
  width:100%;
}
.room:hover{background:color-mix(in srgb,var(--primary) 8%,var(--surface));border-color:var(--border)}
.room.active{background:color-mix(in srgb,var(--primary) 14%,var(--surface));border-color:var(--primary)}
.room strong{display:block;font-size:.9rem}
.room-desc{font-size:.78rem;color:var(--muted);margin-top:.1rem}

/* MAIN CHAT AREA */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
  height:100dvh;
  overflow:hidden;
  position:relative;
}

/* HEADER - pinned top */
.top{
  padding:1rem 1.25rem;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:1rem;
  flex-shrink:0;
  background:var(--surface);
  position:sticky;
  top:0;
  z-index:10;
}
.top h2{font-size:1.3rem;font-weight:700}
.top p{font-size:.82rem;color:var(--muted);margin-top:.1rem}
.badge{
  padding:.35rem .65rem;
  border-radius:999px;
  background:color-mix(in srgb,var(--primary) 16%,transparent);
  color:var(--primary);
  font-size:.72rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.05em;
  flex-shrink:0;
}

/* MESSAGES - only this scrolls */
.msgs{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:1rem 1.25rem;
  display:flex;
  flex-direction:column;
  gap:.75rem;
  scroll-behavior:smooth;
  min-height:0;
}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-track{background:transparent}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.msg{
  max-width:min(680px,85%);
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:1rem;
  padding:.75rem 1rem;
  box-shadow:var(--shadow);
  align-self:flex-start;
  word-break:break-word;
}
.msg.me{
  align-self:flex-end;
  background:var(--primary);
  color:var(--inverse);
  border-color:var(--primary);
}
.meta{
  font-size:.72rem;
  color:var(--muted);
  display:flex;
  gap:.5rem;
  margin-bottom:.25rem;
  flex-wrap:wrap;
}
.msg.me .meta{color:color-mix(in srgb,var(--inverse) 75%,transparent)}
.msg-content{font-size:.95rem;line-height:1.4}

/* COMPOSER - always pinned at bottom */
.composer{
  padding:.75rem 1rem;
  border-top:1px solid var(--border);
  background:var(--surface);
  flex-shrink:0;
  position:sticky;
  bottom:0;
  z-index:10;
  width:100%;
}
.composer-form{
  display:flex;
  gap:.5rem;
  align-items:center;
}
.name-input{
  width:120px;
  min-width:80px;
  flex-shrink:0;
}
.msg-input{flex:1;min-width:0}
input[type=text]{
  height:44px;
  border:1px solid var(--border);
  border-radius:.75rem;
  padding:0 .85rem;
  background:var(--bg);
  color:var(--text);
  font-size:.9rem;
  outline:none;
  transition:border-color .15s;
  width:100%;
}
input[type=text]:focus{border-color:var(--primary)}
.send{
  height:44px;
  min-width:72px;
  border-radius:.75rem;
  background:var(--primary);
  color:var(--inverse);
  font-weight:700;
  font-size:.9rem;
  padding:0 1.1rem;
  flex-shrink:0;
  transition:background .15s;
}
.send:hover{background:var(--primary2)}
.status-bar{
  font-size:.75rem;
  color:var(--muted);
  margin-top:.4rem;
  padding:0 .1rem;
}

/* MOBILE */
@media(max-width:640px){
  .app{flex-direction:column}
  .side{
    width:100%;
    min-width:unset;
    height:auto;
    border-right:none;
    border-bottom:1px solid var(--border);
    padding:.75rem;
    gap:.5rem;
  }
  .main{flex:1;min-height:0}
  .name-input{width:90px}
  .send{min-width:60px;padding:0 .75rem}
}

/* TABLET */
@media(min-width:641px) and (max-width:900px){
  .side{width:220px;min-width:220px}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div>
        <h1>ni88er Chat</h1>
        <div style="font-size:.78rem;color:var(--muted)">Realtime rooms</div>
      </div>
      <button class="toggle" id="themeToggle" aria-label="Switch theme"></button>
    </div>
    <div class="card">
      <div class="card-label">Rooms</div>
      <div class="rooms" id="roomList"></div>
    </div>
  </aside>
  <main class="main">
    <header class="top">
      <div>
        <h2 id="roomTitle">general</h2>
        <p id="roomDesc">Open chat for everyone.</p>
      </div>
      <div class="badge">Live</div>
    </header>
    <section class="msgs" id="messages" aria-live="polite"></section>
    <footer class="composer">
      <form class="composer-form" id="chatForm">
        <input class="name-input" type="text" id="nameInput" maxlength="20" placeholder="Name" value="Guest">
        <input class="msg-input" type="text" id="messageInput" maxlength="250" placeholder="Type a message...">
        <button class="send" type="submit">Send</button>
      </form>
      <div class="status-bar" id="status">Connecting...</div>
    </footer>
  </main>
</div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL='https://ibvmnwntciifgfjuchcw.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlidm1ud250Y2lpZmdmanVjaGN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2ODYyMDksImV4cCI6MjA5MzI2MjIwOX0.c9ZMfTKyggPEDgfgBJ6s0-tBKwnHbOlXL5LcbB3aJrM';
const TABLE='messages';
const rooms={general:{desc:'Open chat for everyone.'},study:{desc:'Homework and project talk.'},gaming:{desc:'Squads and game talk.'}};
const roomList=document.getElementById('roomList');
const msgs=document.getElementById('messages');
const roomTitle=document.getElementById('roomTitle');
const roomDesc=document.getElementById('roomDesc');
const form=document.getElementById('chatForm');
const nameInput=document.getElementById('nameInput');
const messageInput=document.getElementById('messageInput');
const status=document.getElementById('status');
const themeToggle=document.getElementById('themeToggle');
const root=document.documentElement;
let currentRoom='general',client=null,channel=null;
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const timeLabel=d=>new Date(d||Date.now()).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
const scrollBottom=()=>{msgs.scrollTop=msgs.scrollHeight;};
function addMessage(m,own=false){
  const el=document.createElement('article');
  el.className='msg'+(own?' me':'');
  el.innerHTML=`<div class="meta"><strong>${esc(m.username)}</strong><span>${esc(timeLabel(m.created_at))}</span><span>#${esc(m.room)}</span></div><div class="msg-content">${esc(m.content)}</div>`;
  msgs.appendChild(el);
  scrollBottom();
}
function setRoom(room){
  currentRoom=room;
  roomTitle.textContent=room;
  roomDesc.textContent=rooms[room]?.desc;
  document.querySelectorAll('.room').forEach(b=>b.classList.toggle('active',b.dataset.room===room));
  msgs.innerHTML='';
  if(channel){client.removeChannel(channel);channel=null;}
  loadAndSubscribe();
}
function renderRooms(){
  roomList.innerHTML='';
  Object.keys(rooms).forEach(room=>{
    const b=document.createElement('button');
    b.className='room'+(room===currentRoom?' active':'');
    b.dataset.room=room;
    b.type='button';
    b.innerHTML=`<strong>${room}</strong><div class="room-desc">${rooms[room].desc}</div>`;
    b.onclick=()=>setRoom(room);
    roomList.appendChild(b);
  });
}
async function loadAndSubscribe(){
  status.textContent='Loading...';
  const {data,error}=await client.from(TABLE).select('*').eq('room',currentRoom).order('created_at',{ascending:true}).limit(100);
  if(error){status.textContent='Error: '+error.message;return;}
  msgs.innerHTML='';
  data.forEach(row=>addMessage(row,row.username===(nameInput.value.trim()||'Guest')));
  scrollBottom();
  status.textContent='Live in #'+currentRoom;
  channel=client.channel('chat:'+currentRoom)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:TABLE,filter:`room=eq.${currentRoom}`},payload=>{
      addMessage(payload.new,payload.new.username===(nameInput.value.trim()||'Guest'));
    }).subscribe();
}
form.addEventListener('submit',async e=>{
  e.preventDefault();
  const username=nameInput.value.trim()||'Guest';
  const content=messageInput.value.trim();
  if(!content)return;
  messageInput.value='';
  const {error}=await client.from(TABLE).insert({room:currentRoom,username,content});
  if(error){status.textContent='Send failed: '+error.message;return;}
  messageInput.focus();
});
messageInput.addEventListener('focus',()=>setTimeout(scrollBottom,300));
function initTheme(){
  let mode=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
  root.setAttribute('data-theme',mode);
  themeToggle.textContent=mode==='dark'?'☀️':'🌙';
  themeToggle.onclick=()=>{
    mode=mode==='dark'?'light':'dark';
    root.setAttribute('data-theme',mode);
    themeToggle.textContent=mode==='dark'?'☀️':'🌙';
  };
}
client=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
initTheme();renderRooms();loadAndSubscribe();
</script>
</body>
</html>
