<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chat Room</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#f2f2f7;--header-bg:#f9f9f9;--bubble-me:#007aff;--bubble-them:#e5e5ea;
--text-me:#fff;--text-them:#000;--input-bg:#fff;--border:#c7c7cc;
--header-text:#000;--meta:#8e8e93;--send:#007aff
}
[data-theme="dark"]{
--bg:#1c1c1e;--header-bg:#2c2c2e;--bubble-me:#0a84ff;--bubble-them:#3a3a3c;
--text-me:#fff;--text-them:#fff;--input-bg:#2c2c2e;--border:#3a3a3c;
--header-text:#fff;--meta:#8e8e93;--send:#0a84ff
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--header-text);height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:background .3s}
/* PASSWORD SCREEN */
#lock-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
#lock-screen h2{font-size:1.4rem;font-weight:700;color:var(--header-text)}
#lock-screen p{font-size:.9rem;color:var(--meta);text-align:center;max-width:260px}
#lock-input{padding:12px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--input-bg);color:var(--header-text);font-size:1rem;width:260px;outline:none;text-align:center}
#lock-btn{padding:12px 40px;background:var(--send);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer}
#lock-err{color:#ff3b30;font-size:.85rem;display:none}
/* HEADER */
#app{display:none;flex-direction:column;height:100vh}
header{background:var(--header-bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:10px}
.avatar-header{width:36px;height:36px;border-radius:50%;background:var(--bubble-me);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1rem}
.header-info h1{font-size:1rem;font-weight:700;color:var(--header-text)}
.header-info p{font-size:.75rem;color:#34c759}
.header-right{display:flex;gap:8px}
.theme-btn{background:none;border:none;cursor:pointer;font-size:1.3rem;padding:4px}
/* MESSAGES */
#messages{flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:8px}
.msg-row{display:flex;align-items:flex-end;gap:6px;max-width:100%}
.msg-row.me{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;background:var(--bubble-them);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--meta);flex-shrink:0}
.msg-row.me .msg-avatar{display:none}
.bubble{max-width:70%;padding:9px 13px;border-radius:18px;font-size:.95rem;line-height:1.4;word-break:break-word}
.me .bubble{background:var(--bubble-me);color:var(--text-me);border-bottom-right-radius:4px}
.them .bubble{background:var(--bubble-them);color:var(--text-them);border-bottom-left-radius:4px}
.bubble img{max-width:200px;max-height:200px;border-radius:10px;display:block}
.bubble .file-link{color:inherit;text-decoration:underline;font-size:.9rem}
.msg-meta{font-size:.7rem;color:var(--meta);margin-top:2px;display:block}
.me .msg-meta{text-align:right}
/* INPUT BAR */
#input-bar{background:var(--header-bg);border-top:1px solid var(--border);padding:10px 12px;display:flex;align-items:center;gap:8px}
#attach-btn,#gif-btn{background:none;border:none;cursor:pointer;font-size:1.4rem;color:var(--meta);padding:4px;flex-shrink:0}
#file-input{display:none}
#msg-input{flex:1;padding:9px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--input-bg);color:var(--header-text);font-size:.95rem;outline:none;resize:none;max-height:120px;overflow-y:auto;font-family:inherit}
#send-btn{background:var(--send);color:#fff;border:none;border-radius:50%;width:34px;height:34px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s}
#send-btn:active{transform:scale(.9)}
/* GIF PICKER */
#gif-panel{display:none;position:absolute;bottom:70px;left:50%;transform:translateX(-50%);width:320px;max-width:95vw;background:var(--header-bg);border:1px solid var(--border);border-radius:16px;padding:10px;box-shadow:0 8px 30px rgba(0,0,0,.2);z-index:100}
#gif-search{width:100%;padding:8px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--input-bg);color:var(--header-text);font-size:.9rem;outline:none;margin-bottom:8px}
#gif-results{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-height:200px;overflow-y:auto}
#gif-results img{width:100%;height:80px;object-fit:cover;border-radius:8px;cursor:pointer}
/* NAME MODAL */
#name-modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
#name-box{background:var(--header-bg);border-radius:20px;padding:28px 24px;width:300px;text-align:center;display:flex;flex-direction:column;gap:14px}
#name-box h2{font-size:1.2rem;font-weight:700;color:var(--header-text)}
#name-box p{font-size:.85rem;color:var(--meta)}
#name-input{padding:11px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--input-bg);color:var(--header-text);font-size:.95rem;outline:none;text-align:center}
#name-btn{padding:12px;background:var(--send);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<!-- LOCK SCREEN -->
<div id="lock-screen">
<div style="font-size:3rem">&#128274;</div>
<h2>Chat Room</h2>
<p>Enter the password to access the chat</p>
<input id="lock-input" type="password" placeholder="Password" />
<button id="lock-btn">Enter</button>
<span id="lock-err">Wrong password, try again</span>
</div>
<!-- MAIN APP -->
<div id="app">
<!-- NAME MODAL -->
<div id="name-modal">
<div id="name-box">
<h2>Welcome!</h2>
<p>What should we call you?</p>
<input id="name-input" placeholder="Your name" maxlength="20" />
<button id="name-btn">Join Chat</button>
</div>
</div>
<header>
<div class="header-left">
<div class="avatar-header">C</div>
<div class="header-info">
<h1>Chat Room</h1>
<p>Online</p>
</div>
</div>
<div class="header-right">
<button class="theme-btn" id="theme-toggle" title="Toggle theme">&#9788;&#65039;</button>
</div>
</header>
<div id="messages"></div>
<!-- GIF PANEL -->
<div id="gif-panel">
<input id="gif-search" placeholder="Search GIFs..." />
<div id="gif-results"></div>
</div>
<div id="input-bar">
<button id="attach-btn" title="Attach file">&#128206;</button>
<input type="file" id="file-input" accept="image/*,video/*,.pdf,.doc,.docx,.txt" />
<button id="gif-btn" title="Send GIF">GIF</button>
<textarea id="msg-input" placeholder="iMessage" rows="1"></textarea>
<button id="send-btn">&#8593;</button>
</div>
</div>
<script>
const SUPABASE_URL='https://fhkgnkqfvmhshjxoxzry.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZoa2dua3Fmdm1oc2hqeG94enJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkwMjk1MDcsImV4cCI6MjA2NDYwNTUwN30.ERhbEg8u5xEilGcC-IYJ6qxfmFqNlRBLH2HtWWVQpK4';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const TENOR_KEY='AIzaSyAyimkuYQYF_y5c6MVjOekdHQZFDCTyGVU';
const PASSWORD='fuckeshwar';
let username='';
let isDark=false;
// LOCK SCREEN
document.getElementById('lock-btn').onclick=function(){
  const v=document.getElementById('lock-input').value.trim();
  if(v===PASSWORD){
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('app').style.display='flex';
  } else {
    document.getElementById('lock-err').style.display='block';
  }
};
document.getElementById('lock-input').addEventListener('keydown',function(e){
  if(e.key==='Enter') document.getElementById('lock-btn').click();
});
// THEME TOGGLE
document.getElementById('theme-toggle').onclick=function(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'');
  this.textContent=isDark?'\u2600\uFE0F':'\u2600\uFE0F';
};
// NAME MODAL
document.getElementById('name-btn').onclick=function(){
  const n=document.getElementById('name-input').value.trim();
  if(!n) return;
  username=n;
  document.getElementById('name-modal').style.display='none';
  loadMessages();
  subscribeMessages();
};
document.getElementById('name-input').addEventListener('keydown',function(e){
  if(e.key==='Enter') document.getElementById('name-btn').click();
});
// MESSAGES
const messagesEl=document.getElementById('messages');
function renderMsg(m){
  const isMe=m.username===username;
  const row=document.createElement('div');
  row.className='msg-row '+(isMe?'me':'them');
  const av=document.createElement('div');
  av.className='msg-avatar';
  av.textContent=(m.username||'?')[0].toUpperCase();
  const col=document.createElement('div');
  col.style.display='flex';col.style.flexDirection='column';
  col.style.alignItems=isMe?'flex-end':'flex-start';
  if(!isMe){
    const nm=document.createElement('span');
    nm.style.cssText='font-size:.7rem;color:var(--meta);margin-bottom:2px;margin-left:4px';
    nm.textContent=m.username;
    col.appendChild(nm);
  }
  const bub=document.createElement('div');
  bub.className='bubble';
  if(m.file_url){
    if(/\.(jpe?g|png|gif|webp)$/i.test(m.file_url)||m.file_url.includes('media.tenor')){
      const img=document.createElement('img');img.src=m.file_url;bub.appendChild(img);
    } else {
      const a=document.createElement('a');a.href=m.file_url;a.target='_blank';
      a.textContent=m.file_name||'File';a.className='file-link';bub.appendChild(a);
    }
    if(m.content) bub.appendChild(document.createTextNode(m.content));
  } else {
    bub.textContent=m.content;
  }
  const meta=document.createElement('span');
  meta.className='msg-meta';
  const d=new Date(m.created_at);
  meta.textContent=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  col.appendChild(bub);col.appendChild(meta);
  row.appendChild(av);row.appendChild(col);
  messagesEl.appendChild(row);
  messagesEl.scrollTop=messagesEl.scrollHeight;
}
async function loadMessages(){
  const{data}=await sb.from('messages').select('*').eq('room','general').order('created_at',{ascending:true});
  if(data) data.forEach(renderMsg);
}
function subscribeMessages(){
  sb.channel('public:messages').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},payload=>{
    renderMsg(payload.new);
  }).subscribe();
}
async function sendMsg(content,file_url,file_name){
  if(!content&&!file_url) return;
  await sb.from('messages').insert([{room:'general',username,content:content||'',file_url:file_url||null,file_name:file_name||null}]);
}
// SEND BUTTON
document.getElementById('send-btn').onclick=async function(){
  const t=document.getElementById('msg-input').value.trim();
  if(!t) return;
  document.getElementById('msg-input').value='';
  await sendMsg(t);
};
document.getElementById('msg-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();document.getElementById('send-btn').click();}
});
// FILE UPLOAD
document.getElementById('attach-btn').onclick=()=>document.getElementById('file-input').click();
document.getElementById('file-input').onchange=async function(){
  const f=this.files[0];if(!f) return;
  const path=`${Date.now()}_${f.name}`;
  const{error}=await sb.storage.from('chat-files').upload(path,f);
  if(error){alert('Upload failed: '+error.message);return;}
  const{data}=sb.storage.from('chat-files').getPublicUrl(path);
  await sendMsg('',data.publicUrl,f.name);
  this.value='';
};
// GIF PANEL
let gifOpen=false;
document.getElementById('gif-btn').onclick=function(){
  gifOpen=!gifOpen;
  document.getElementById('gif-panel').style.display=gifOpen?'block':'none';
  if(gifOpen) searchGifs('hello');
};
async function searchGifs(q){
  const r=await fetch(`https://tenor.googleapis.com/v2/search?q=${encodeURIComponent(q)}&key=${TENOR_KEY}&limit=12&media_filter=gif`);
  const d=await r.json();
  const c=document.getElementById('gif-results');
  c.innerHTML='';
  if(d.results){
    d.results.forEach(g=>{
      const img=document.createElement('img');
      img.src=g.media_formats.tinygif.url;
      img.onclick=async()=>{
        gifOpen=false;
        document.getElementById('gif-panel').style.display='none';
        await sendMsg('',g.media_formats.gif.url,'gif');
      };
      c.appendChild(img);
    });
  }
}
document.getElementById('gif-search').addEventListener('input',function(){
  if(this.value.length>1) searchGifs(this.value);
});
</script>
</body>
</html>
