<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Open Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#e2e8f0;display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sidebar{width:240px;min-width:240px;background:#16213e;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,0.08)}
.sidebar-header{padding:1rem;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:0.6rem}
.sidebar-header h1{font-size:1rem;font-weight:700;color:#e2e8f0}  
.sidebar-header span{font-size:1.3rem}
.rooms-label{padding:0.8rem 1rem 0.3rem;font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#64748b}
.room-item{display:flex;align-items:center;gap:0.5rem;padding:0.4rem 0.8rem;margin:0.1rem 0.5rem;border-radius:6px;cursor:pointer;color:#94a3b8;font-size:0.9rem;transition:all .15s}
.room-item:hover{background:rgba(255,255,255,0.06);color:#e2e8f0}
.room-item.active{background:#5865f2;color:#fff}
.room-item::before{content:'#';font-weight:700;opacity:0.6}
.sidebar-footer{margin-top:auto;padding:0.8rem;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:0.5rem}
.avatar{width:32px;height:32px;border-radius:50%;background:#5865f2;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0}
.uname-input{flex:1;background:transparent;border:none;color:#e2e8f0;font-size:0.85rem;outline:none}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;background:#1e1e2e;overflow:hidden}
.main-header{padding:0.8rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:0.5rem}
.main-header .hash{color:#64748b;font-size:1.1rem;font-weight:700}
.main-header h2{font-size:0.95rem;font-weight:600;color:#e2e8f0}
#status{font-size:0.72rem;padding:0.2rem 1.2rem;background:rgba(0,0,0,0.2);color:#64748b;text-align:center}
#messages{flex:1;overflow-y:auto;padding:1rem 1.2rem;display:flex;flex-direction:column;gap:0.2rem}
#messages::-webkit-scrollbar{width:6px}
#messages::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
.msg{padding:0.3rem 0.5rem;border-radius:4px;transition:background .1s}
.msg:hover{background:rgba(255,255,255,0.03)}
.msg .meta{font-size:0.75rem;color:#64748b;margin-bottom:0.1rem}
.msg .meta span{color:#5865f2;font-weight:600;margin-right:0.4rem}
.msg .text{font-size:0.9rem;color:#d1d5db;word-break:break-word;line-height:1.5}
.msg img{max-width:320px;max-height:240px;border-radius:8px;margin-top:0.3rem;cursor:pointer;display:block}
.msg .file-link{display:inline-flex;align-items:center;gap:0.4rem;background:rgba(88,101,242,0.15);border:1px solid rgba(88,101,242,0.3);padding:0.4rem 0.8rem;border-radius:8px;color:#818cf8;text-decoration:none;font-size:0.85rem;margin-top:0.3rem}
.msg .file-link:hover{background:rgba(88,101,242,0.25)}
/* INPUT AREA */
.input-area{padding:0.8rem 1.2rem;border-top:1px solid rgba(255,255,255,0.06)}
.input-box{display:flex;align-items:center;gap:0.5rem;background:#2d2d44;border-radius:10px;padding:0.5rem 0.8rem;border:1px solid rgba(255,255,255,0.08)}
.attach-btn{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:1.2rem;padding:0.2rem;line-height:1;flex-shrink:0;transition:color .15s}
.attach-btn:hover{color:#e2e8f0}
#msg{flex:1;background:transparent;border:none;color:#e2e8f0;font-size:0.9rem;outline:none;resize:none;max-height:120px;line-height:1.5}
#msg::placeholder{color:#64748b}
.send-btn{background:#5865f2;border:none;color:#fff;padding:0.4rem 0.9rem;border-radius:7px;cursor:pointer;font-size:0.85rem;font-weight:600;flex-shrink:0;transition:background .15s}
.send-btn:hover{background:#4752c4}
#file-input{display:none}
.upload-preview{padding:0.4rem 1.2rem;display:none;align-items:center;gap:0.5rem;font-size:0.8rem;color:#94a3b8}
.upload-preview.show{display:flex}
.upload-preview .cancel{cursor:pointer;color:#f87171;margin-left:auto}
/* IMAGE LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.show{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header"><span>💬</span><h1>Open Chat</h1></div>
  <div class="rooms-label">Rooms</div>
  <div class="room-item active" onclick="switchRoom('general',this)">general</div>
  <div class="room-item" onclick="switchRoom('study',this)">study-hall</div>
  <div class="room-item" onclick="switchRoom('gaming',this)">gaming</div>
  <div class="room-item" onclick="switchRoom('random',this)">random</div>
  <div class="sidebar-footer">
    <div class="avatar" id="av">A</div>
    <input class="uname-input" id="uname" value="Anonymous" maxlength="20" placeholder="Your name" oninput="updateAvatar()"/>
  </div>
</div>
<div class="main">
  <div class="main-header"><span class="hash">#</span><h2 id="room-title">general</h2></div>
  <div id="status">Connecting...</div>
  <div id="messages"></div>
  <div class="upload-preview" id="preview"><span id="preview-name"></span><span class="cancel" onclick="cancelUpload()">✕ Cancel</span></div>
  <div class="input-area">
    <div class="input-box">
      <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach image, GIF or file">📎</button>
      <input type="file" id="file-input" accept="image/*,.gif,.pdf,.txt,.zip,.mp4" onchange="handleFile(event)"/>
      <textarea id="msg" rows="1" placeholder="Message #general" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>
<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')"><img id="lightbox-img"/></div>
<script>
const SUPA_URL='https://ibvmnwntciifgfjuchcw.supabase.co';
const SUPA_KEY='sb_publishable_HcNk-snxnySBE9adLYTlKg_4sIOCmKI';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
let room='general',ch,pendingFile=null;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function stat(m){document.getElementById('status').textContent=m;}
function box(){return document.getElementById('messages');}

function updateAvatar(){
  const v=document.getElementById('uname').value.trim()||'A';
  document.getElementById('av').textContent=v[0].toUpperCase();
}

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

function renderMsg(m){
  const b=box();
  const empty=b.querySelector('.empty');if(empty)empty.remove();
  const d=document.createElement('div');d.className='msg';
  const t=new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  let body='';
  if(m.content)body+='<div class="text">'+esc(m.content)+'</div>';
  if(m.file_url){
    const isImg=/\.(png|jpg|jpeg|gif|webp|svg)(\?|$)/i.test(m.file_url);
    if(isImg)body+='<img src="'+m.file_url+'" onclick="openLightbox(this.src)" alt="image"/>';
    else body+='<a class="file-link" href="'+m.file_url+'" target="_blank" download>📄 '+esc(m.file_name||'File')+'</a>';
  }
  d.innerHTML='<div class="meta"><span>'+esc(m.username)+'</span>'+t+'</div>'+body;
  b.appendChild(d);b.scrollTop=b.scrollHeight;
}

async function load(){
  const b=box();b.innerHTML='<div class="empty" style="color:#64748b;text-align:center;padding:2rem">Loading...</div>';
  const{data,error}=await sb.from('messages').select('*').eq('room',room).order('created_at',{ascending:true}).limit(100);
  b.innerHTML='';
  if(error){stat('Error: '+error.message);return;}
  if(!data.length)b.innerHTML='<div class="empty" style="color:#64748b;text-align:center;padding:2rem">No messages yet — say hello!</div>';
  else data.forEach(renderMsg);
  b.scrollTop=b.scrollHeight;
  stat('Connected · #'+room);
}

function subscribe(){
  if(ch)sb.removeChannel(ch);
  ch=sb.channel('room-'+room)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'room=eq.'+room},p=>renderMsg(p.new))
    .subscribe(s=>{if(s==='SUBSCRIBED')stat('Connected · #'+room);});
}

function switchRoom(r,el){
  room=r;
  document.querySelectorAll('.room-item').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('room-title').textContent=r;
  document.querySelector('#msg').placeholder='Message #'+r;
  load();subscribe();
}

function handleFile(e){
  const f=e.target.files[0];if(!f)return;
  pendingFile=f;
  document.getElementById('preview-name').textContent='📎 '+f.name;
  document.getElementById('preview').classList.add('show');
}

function cancelUpload(){
  pendingFile=null;
  document.getElementById('file-input').value='';
  document.getElementById('preview').classList.remove('show');
}

async function uploadFile(file){
  const ext=file.name.split('.').pop();
  const path=room+'/'+Date.now()+'-'+Math.random().toString(36).slice(2)+'.'+ext;
  const{data,error}=await sb.storage.from('chat-files').upload(path,file,{upsert:true});
  if(error)throw error;
  const{data:pub}=sb.storage.from('chat-files').getPublicUrl(path);
  return{url:pub.publicUrl,name:file.name};
}

async function sendMsg(){
  const content=document.getElementById('msg').value.trim();
  const username=document.getElementById('uname').value.trim()||'Anonymous';
  if(!content&&!pendingFile)return;
  document.getElementById('msg').value='';
  document.getElementById('msg').style.height='auto';
  let file_url=null,file_name=null;
  if(pendingFile){
    try{
      stat('Uploading file...');
      const r=await uploadFile(pendingFile);
      file_url=r.url;file_name=r.name;
    }catch(e){stat('Upload failed: '+e.message);return;}
    cancelUpload();
  }
  const row={room,username,content:content||null,file_url,file_name};
  const{error}=await sb.from('messages').insert(row);
  if(error)stat('Error: '+error.message);
}

function openLightbox(src){
  document.getElementById('lightbox-img').src=src;
  document.getElementById('lightbox').classList.add('show');
}

load();subscribe();
</script>
</body>
</html>
