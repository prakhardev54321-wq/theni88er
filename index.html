<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><title>ni88er Chat Room</title><link href="https://api.fontshare.com/v2/css?f=satoshi:400,500,700&display=swap" rel="stylesheet"><style>:root,[data-theme="light"]{
  --bg:#f7f6f2;--surface:#fbfbf9;--surface2:#f4f2ed;
  --border:#d5d1c9;--text:#27241d;--muted:#79766f;
  --primary:#01696f;--primary2:#0c4e54;--inverse:#f9f8f4;
  --shadow:0 4px 20px rgba(0,0,0,.07);
  --radius:1rem;--font:Satoshi,system-ui,sans-serif;
}
[data-theme="dark"]{
            --bg:#030303;--surface:#181818;--surface2:#222222;
      --border:#1f1f1f;--text:#e8e8e8;--muted:#666666;
      --primary:#5bb8c4;--primary2:#3a9aab;--inverse:#000000;
  --shadow:0 4px 20px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;width:100%;
  font-family:var(--font);color:var(--text);
    background:radial-gradient(ellipse at top left,color-mix(in srgb,var(--primary) 10%,transparent) 35%,var(--bg));
  overflow:hidden;
}
button,input{font:inherit;box-sizing:border-box}
button{cursor:pointer;border:none;background:none}
.app{display:flex;height:100dvh;width:100dvw;overflow:hidden}
.side{
  width:280px;min-width:280px;flex-shrink:0;
  display:flex;flex-direction:column;
    background:var(--surface2);border-right:1px solid var(--border);
  overflow:hidden;padding:1rem;gap:.75rem;
}
.brand{display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.brand h1{font-size:1.25rem;font-weight:700}
.toggle{width:38px;height:38px;border-radius:999px;background:var(--surface2);color:var(--text);font-size:1rem;flex-shrink:0}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem;flex-shrink:0}
.card-label{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
.rooms{display:flex;flex-direction:column;gap:.4rem}
.room{padding:.7rem .9rem;text-align:left;border-radius:.75rem;border:1px solid transparent;color:var(--text);transition:background .15s,border-color .15s;width:100%}
.room:hover{background:color-mix(in srgb,var(--primary) 8%,var(--surface));border-color:var(--border)}
.room.active{background:color-mix(in srgb,var(--primary) 14%,var(--surface));border-color:var(--primary)}
.room strong{display:block;font-size:.9rem}
.room-desc{font-size:.78rem;color:var(--muted);margin-top:.1rem}
.main{flex:1;min-width:0;display:flex;flex-direction:column;height:100dvh;overflow:hidden;position:relative}
.top{
  flex-shrink:0;padding:1rem 1.25rem;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;gap:1rem;
    background:var(--surface2);
}
.top h2{font-size:1.3rem;font-weight:700}
.top p{font-size:.82rem;color:var(--muted);margin-top:.1rem}
.badge{padding:.35rem .65rem;border-radius:999px;background:color-mix(in srgb,var(--primary) 16%,transparent);color:var(--primary);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}
.msgs{
  flex:1;min-height:0;
    background:var(--bg);
  overflow-y:auto;overflow-x:hidden;
  padding:1rem 1.25rem;
  padding-bottom:90px;
  display:flex;flex-direction:column;gap:.75rem;
  scroll-behavior:smooth;
}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-track{background:transparent}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg{
  max-width:min(680px,85%);
  background:var(--surface);border:1px solid var(--border);
  border-radius:1rem;padding:.75rem 1rem;
  box-shadow:var(--shadow);align-self:flex-start;word-break:break-word;
}
.msg.me{align-self:flex-end;background:var(--primary);color:var(--inverse);border-color:var(--primary)}
.meta{font-size:.72rem;color:var(--muted);display:flex;gap:.5rem;margin-bottom:.25rem;flex-wrap:wrap}
.msg.me .meta{color:color-mix(in srgb,var(--inverse) 75%,transparent)}
.msg-content{font-size:.95rem;line-height:1.4}
/* FLOATING COMPOSER */
.composer{
  position:absolute;
  bottom:1.25rem;
  left:50%;
  transform:translateX(-50%);
  width:calc(100% - 2.5rem);
  max-width:820px;
  z-index:10;
  background:transparent;
}
.composer-row{
  display:flex;align-items:center;gap:0;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:1rem;
  overflow:hidden;
  height:48px;
  box-shadow:0 8px 32px rgba(0,0,0,.18),0 1.5px 6px rgba(0,0,0,.10);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.name-inp{
  width:120px;flex-shrink:0;
  height:100%;border:none;outline:none;
  background:transparent;color:var(--text);
  font:inherit;font-size:.9rem;font-weight:600;
  padding:0 .75rem;
}
.sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
.msg-inp{
  flex:1;min-width:0;
  height:100%;border:none;outline:none;
  background:transparent;color:var(--text);
  font:inherit;font-size:.9rem;
  padding:0 .75rem;
}
.send-btn{
  flex-shrink:0;height:100%;
  padding:0 1.25rem;
  background:var(--primary);color:var(--inverse);
  font-weight:700;font-size:.9rem;
  border:none;cursor:pointer;
  transition:background .15s;
}
.send-btn:hover{background:var(--primary2)}
.status-bar{font-size:.75rem;color:var(--muted);margin-top:.4rem;padding:0 .25rem;text-align:center}
@media(max-width:640px){
  .app{flex-direction:column}
  .side{width:100%;min-width:unset;height:auto;border-right:none;border-bottom:1px solid var(--border);padding:.75rem;gap:.5rem}
  .main{flex:1;min-height:0}
  .name-inp{width:80px}
  .composer{bottom:.85rem;width:calc(100% - 1.5rem)}
}
@media(min-width:641px) and (max-width:900px){
  .side{width:220px;min-width:220px}
}
</style></head><body><div class="app"><aside class="side"><div class="brand"><div><h1>ni88er Chat</h1></div><button class="toggle" id="themeToggle" aria-label="Switch theme">🌙</button></div><div class="card"><div class="card-label">Rooms</div><div class="rooms" id="roomList"></div></div></aside><main class="main"><header class="top"><div><h2 id="roomTitle">general</h2><p id="roomDesc">Open chat for everyone.</p></div><div class="badge">Live</div></header><section class="msgs" id="messages" aria-live="polite"></section><footer class="composer"><div class="composer-row"><input class="name-inp" type="text" id="nameInput" maxlength="20" placeholder="Name" value="Guest"><div class="sep"></div><input class="msg-inp" type="text" id="messageInput" maxlength="250" placeholder="Type a message..."><button class="send-btn" id="sendBtn" type="button">Send</button></div><div class="status-bar" id="status">Connecting...</div></footer></main></div><script type="module">import{createClient}from'https://esm.sh/@supabase/supabase-js@2';const SUPABASE_URL='https://ibvmnwntciifgfjuchcw.supabase.co';const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlidm1ud250Y2lpZmdmanVjaGN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2ODYyMDksImV4cCI6MjA5MzI2MjIwOX0.c9ZMfTKyggPEDgfgBJ6s0-tBKwnHbOlXL5LcbB3aJrM';const TABLE='messages';const rooms={general:{desc:'Open chat for everyone.'},study:{desc:'Homework and project talk.'},gaming:{desc:'Squads and game talk.'}};const roomList=document.getElementById('roomList');const msgs=document.getElementById('messages');const roomTitle=document.getElementById('roomTitle');const roomDesc=document.getElementById('roomDesc');const nameInput=document.getElementById('nameInput');const messageInput=document.getElementById('messageInput');const sendBtn=document.getElementById('sendBtn');const status=document.getElementById('status');const themeToggle=document.getElementById('themeToggle');const root=document.documentElement;let currentRoom='general',client=null,channel=null;const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const timeLabel=d=>new Date(d||Date.now()).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});const scrollBottom=()=>{msgs.scrollTop=msgs.scrollHeight;};function addMessage(m,own=false){const el=document.createElement('article');el.className='msg'+(own?' me':'');el.innerHTML=`<div class="meta"><strong>${esc(m.username)}</strong><span>${esc(timeLabel(m.created_at))}</span><span>#${esc(m.room)}</span></div><div class="msg-content">${esc(m.content)}</div>`;msgs.appendChild(el);scrollBottom();}function setRoom(room){currentRoom=room;roomTitle.textContent=room;roomDesc.textContent=rooms[room]?.desc;document.querySelectorAll('.room').forEach(b=>b.classList.toggle('active',b.dataset.room===room));msgs.innerHTML='';if(channel){client.removeChannel(channel);channel=null;}loadAndSubscribe();}function renderRooms(){roomList.innerHTML='';Object.keys(rooms).forEach(room=>{const b=document.createElement('button');b.className='room'+(room===currentRoom?' active':'');b.dataset.room=room;b.type='button';b.innerHTML=`<strong>${room}</strong><div class="room-desc">${rooms[room].desc}</div>`;b.onclick=()=>setRoom(room);roomList.appendChild(b);});}async function loadAndSubscribe(){status.textContent='Loading...';const{data,error}=await client.from(TABLE).select('*').eq('room',currentRoom).order('created_at',{ascending:true}).limit(100);if(error){status.textContent='Error: '+error.message;return;}msgs.innerHTML='';data.forEach(row=>addMessage(row,row.username===(nameInput.value.trim()||'Guest')));scrollBottom();status.textContent='Live in #'+currentRoom;channel=client.channel('chat:'+currentRoom).on('postgres_changes',{event:'INSERT',schema:'public',table:TABLE,filter:`room=eq.${currentRoom}`},payload=>{addMessage(payload.new,payload.new.username===(nameInput.value.trim()||'Guest'));}).subscribe();}async function sendMessage(){const username=nameInput.value.trim()||'Guest';const content=messageInput.value.trim();if(!content)return;messageInput.value='';const{error}=await client.from(TABLE).insert({room:currentRoom,username,content});if(error){status.textContent='Send failed: '+error.message;return;}messageInput.focus();}sendBtn.addEventListener('click',sendMessage);messageInput.addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage();});messageInput.addEventListener('focus',()=>setTimeout(scrollBottom,300));function initTheme(){let mode=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';root.setAttribute('data-theme',mode);themeToggle.textContent=mode==='dark'?'☀️':'🌙';themeToggle.onclick=()=>{mode=mode==='dark'?'light':'dark';root.setAttribute('data-theme',mode);themeToggle.textContent=mode==='dark'?'☀️':'🌙';};}client=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);initTheme();renderRooms();loadAndSubscribe();</script></body></html>
