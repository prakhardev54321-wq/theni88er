<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ni88er Chat Room</title>
<link href="https://api.fontshare.com/v2/css?f=satoshi:400,500,700&display=swap" rel="stylesheet">
<style>
:root, [data-theme="light"] {
  --bg: #f7f6f2;
  --surface: #fbfbf9;
  --surface2: #f4f2ed;
  --border: #d5d1c9;
  --text: #27241d;
  --muted: #79766f;
  --primary: #01696f;
  --primary2: #0c4e54;
  --inverse: #f9f8f4;
  --shadow: 0 10px 30px rgba(0,0,0,.08);
  --radius: 1rem;
  --font: Satoshi, system-ui, sans-serif;
}
[data-theme="dark"] {
  --bg: #171614;
  --surface: #1d1c1a;
  --surface2: #22211f;
  --border: #393733;
  --text: #d0cfcc;
  --muted: #9b9892;
  --primary: #4f98a3;
  --primary2: #227f8b;
  --inverse: #1b1a18;
  --shadow: 0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
body{margin:0;min-height:100dvh;font-family:var(--font);color:var(--text);background:radial-gradient(circle at top left,color-mix(in srgb,var(--primary) 18%,transparent) 30%,var(--bg))}
button,input{font:inherit}
button{cursor:pointer;border:none}
.app{display:grid;grid-template-columns:300px 1fr;min-height:100dvh}
.side{padding:1.25rem;border-right:1px solid var(--border);background:var(--surface)}
.brand{display:flex;justify-content:space-between;align-items:center;gap:1rem;margin-bottom:1rem}
.brand h1{font-size:1.4rem;margin:0}
.toggle{width:42px;height:42px;border-radius:999px;background:var(--surface2);color:var(--text)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:1rem;margin-bottom:1rem}
.card h2{margin:.1rem 0 .7rem;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.rooms{display:grid;gap:.65rem}
.room{padding:.85rem 1rem;text-align:left;border-radius:.85rem;background:transparent;border:1px solid var(--border);color:var(--text)}
.room.active,.room:hover{background:color-mix(in srgb,var(--primary) 12%,var(--surface));border-color:var(--primary)}
.main{display:grid;grid-template-rows:auto 1fr auto;min-height:100dvh}
.top{padding:1.25rem 1.35rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:1rem}
.top h2{margin:0;font-size:1.65rem}
.top p{margin:.25rem 0 0;color:var(--muted)}
.badge{padding:.45rem .7rem;border-radius:999px;background:color-mix(in srgb,var(--primary) 16%,transparent);color:var(--primary);font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.msgs{padding:1.25rem;overflow:auto;display:flex;flex-direction:column;gap:.85rem}
.msg{max-width:min(760px,100%);background:var(--surface);border:1px solid var(--border);border-radius:1rem;padding:1rem;box-shadow:var(--shadow)}
.msg.me{align-self:flex-end;background:var(--primary);color:var(--inverse)}
.meta{font-size:.78rem;color:var(--muted);display:flex;gap:.6rem;margin-bottom:.3rem}
.msg.me .meta{color:color-mix(in srgb,var(--inverse) 80%,transparent)}
.composer{padding:1rem 1.25rem 1.25rem;border-top:1px solid var(--border)}
form{display:grid;grid-template-columns:150px 1fr auto;gap:.75rem;padding:.75rem;border:1px solid var(--border);border-radius:1rem;background:var(--surface)}
input{min-height:48px;border:1px solid var(--border);border-radius:.85rem;padding:0 1rem;background:var(--bg);color:var(--text)}
.send{min-width:100px;border-radius:.85rem;background:var(--primary);color:var(--inverse);font-weight:700;padding:0 1.5rem}
.send:hover{background:var(--primary2)}
.note{font-size:.82rem;color:var(--muted);margin-top:.75rem}
.small{font-size:.85rem;color:var(--muted)}
@media(max-width:800px){
  .app{grid-template-columns:1fr}
  .side{border-right:none;border-bottom:1px solid var(--border)}
  form{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div>
        <h1>ni88er Chat</h1>
        <div class="small">Realtime rooms</div>
      </div>
      <button class="toggle" id="themeToggle" aria-label="Switch theme"></button>
    </div>
    <div class="card">
      <h2>Rooms</h2>
      <div class="rooms" id="roomList"></div>
    </div>
  </aside>
  <main class="main">
    <header class="top">
      <div>
        <h2 id="roomTitle">general</h2>
        <p id="roomDesc">Open chat for everyone.</p>
      </div>
      <div class="badge">Live</div>
    </header>
    <section class="msgs" id="messages" aria-live="polite"></section>
    <footer class="composer">
      <form id="chatForm">
        <input id="nameInput" maxlength="20" placeholder="Your name" value="Guest">
        <input id="messageInput" maxlength="250" placeholder="Type a message...">
        <button class="send" type="submit">Send</button>
      </form>
      <div class="note" id="status">Connecting...</div>
    </footer>
  </main>
</div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://ibvmnwntciifgfjuchcw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlidm1ud250Y2lpZmdmanVjaGN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2ODYyMDksImV4cCI6MjA5MzI2MjIwOX0.c9ZMfTKyggPEDgfgBJ6s0-tBKwnHbOlXL5LcbB3aJrM';
const TABLE = 'messages';

const rooms = {
  general: { desc: 'Open chat for everyone.' },
  study:   { desc: 'Homework and project talk.' },
  gaming:  { desc: 'Squads and game talk.' }
};

const roomList     = document.getElementById('roomList');
const msgs         = document.getElementById('messages');
const roomTitle    = document.getElementById('roomTitle');
const roomDesc     = document.getElementById('roomDesc');
const form         = document.getElementById('chatForm');
const nameInput    = document.getElementById('nameInput');
const messageInput = document.getElementById('messageInput');
const status       = document.getElementById('status');
const themeToggle  = document.getElementById('themeToggle');
const root         = document.documentElement;

let currentRoom = 'general';
let client = null;
let channel = null;

const esc = v => String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const timeLabel = d => new Date(d || Date.now()).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });

function addMessage(m, own = false) {
  const el = document.createElement('article');
  el.className = 'msg' + (own ? ' me' : '');
  el.innerHTML = `<div class="meta"><strong>${esc(m.user)}</strong><span>${esc(timeLabel(m.created_at))}</span><span>#${esc(m.room)}</span></div><div>${esc(m.content)}</div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function setRoom(room) {
  currentRoom = room;
  roomTitle.textContent = room;
  roomDesc.textContent = rooms[room]?.desc;
  document.querySelectorAll('.room').forEach(b => b.classList.toggle('active', b.dataset.room === room));
  msgs.innerHTML = '';
  if (channel) { client.removeChannel(channel); channel = null; }
  loadAndSubscribe();
}

function renderRooms() {
  roomList.innerHTML = '';
  Object.keys(rooms).forEach(room => {
    const b = document.createElement('button');
    b.className = 'room' + (room === currentRoom ? ' active' : '');
    b.dataset.room = room;
    b.type = 'button';
    b.innerHTML = `<strong>${room}</strong><div class="small">${rooms[room].desc}</div>`;
    b.onclick = () => setRoom(room);
    roomList.appendChild(b);
  });
}

async function loadAndSubscribe() {
  const { data, error } = await client
    .from(TABLE)
    .select('*')
    .eq('room', currentRoom)
    .order('created_at', { ascending: true })
    .limit(50);
  if (error) { status.textContent = 'Error: ' + error.message; return; }
  data.forEach(row => addMessage(row, row.user === (nameInput.value.trim() || 'Guest')));
  status.textContent = 'Live in #' + currentRoom;

  channel = client.channel('chat:' + currentRoom)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: TABLE,
      filter: `room=eq.${currentRoom}`
    }, payload => {
      addMessage(payload.new, payload.new.user === (nameInput.value.trim() || 'Guest'));
    })
    .subscribe();
}

form.addEventListener('submit', async e => {
  e.preventDefault();
  const user = nameInput.value.trim() || 'Guest';
  const content = messageInput.value.trim();
  if (!content) return;
  const { error } = await client.from(TABLE).insert({ room: currentRoom, user, content });
  if (error) { status.textContent = 'Send failed: ' + error.message; return; }
  messageInput.value = '';
  messageInput.focus();
});

function initTheme() {
  let mode = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  root.setAttribute('data-theme', mode);
  themeToggle.textContent = mode === 'dark' ? '☀️' : '🌙';
  themeToggle.onclick = () => {
    mode = mode === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', mode);
    themeToggle.textContent = mode === 'dark' ? '☀️' : '🌙';
  };
}

client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
initTheme();
renderRooms();
loadAndSubscribe();
</script>
</body>
</html>
